services:
  wechat-collector:
    build: .
    container_name: wechat-collector
    ports:
      - "8686:8686"
    volumes:
      # 持久化缓存和文章数据
      - ./data:/app/data
      # 挂载配置文件，方便修改 server_base_url 等
      - ./config.yaml:/app/config.yaml
      # 挂载静态文件，修改后无需重建镜像
      - ./static:/app/static
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
